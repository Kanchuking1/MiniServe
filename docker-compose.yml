# MiniServe — Day 5: scale workers with --scale worker=3 | Day 7: single-host deploy (EC2)
# Production: all services use restart: unless-stopped for EC2 / single instance.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: DockerFile.api
    image: miniserve-api:latest
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: DockerFile.worker
    image: miniserve-worker:latest
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  inference:
    build:
      context: .
      dockerfile: DockerFile.worker
    image: miniserve-worker:latest
    command: ["python", "worker/run_inference.py", "--benchmark", "20"]
    profiles:
      - day1

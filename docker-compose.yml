# MiniServe — Day 3: API + Redis (worker in Day 4)

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: DockerFile.api
    image: miniserve-api:latest
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  inference:
    build:
      context: .
      dockerfile: DockerFile.worker
    image: miniserve-worker:latest
    command: ["--benchmark", "20"]
    profiles:
      - day1

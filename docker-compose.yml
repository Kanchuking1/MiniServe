# MiniServe — Day 5: API + Redis + Worker(s); scale workers: docker compose up --scale worker=3

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: DockerFile.api
    image: miniserve-api:latest
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: DockerFile.worker
    image: miniserve-worker:latest
    environment:
      REDIS_URL: redis://redis:6379/0
      # WORKER_ID defaults to hostname (unique per replica when using --scale worker=N)
    depends_on:
      - redis

  inference:
    build:
      context: .
      dockerfile: DockerFile.worker
    image: miniserve-worker:latest
    command: ["python", "worker/run_inference.py", "--benchmark", "20"]
    profiles:
      - day1
